<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"><title>Local Morph Head</title><link rel="stylesheet" href="style.css"></head><body><div id="app"><canvas id="view"></canvas><div id="loader" class="loader"><div><b>טוען ראש מקומי...</b><br><span id="loaderText">מכין fallback בלי מודל חיצוני...</span></div></div><header><div class="badge">LOCAL V2</div><div><div class="title">Morph + Loomis Head</div><div class="sub">local head · no external GLB · 3D guide cage</div></div></header><section class="panel"><div class="handle"></div><div class="grid cols3"><button class="btn" data-camera="front">Front</button><button class="btn" data-camera="threeq">¾</button><button class="btn" data-camera="profile">Profile</button></div><div class="grid cols3" style="margin-top:8px"><button class="btn" data-camera="up">Look Up</button><button class="btn" data-camera="down">Look Down</button><button class="btn warn" id="resetBtn">Reset</button></div><div class="grid cols3" style="margin-top:8px"><button class="btn" id="guidesBtn">Loomis Guides</button><button class="btn" id="edgeBtn">Edges</button><button class="btn" id="labelBtn">Labels</button></div><div class="section"><h3>הטיית הראש</h3><div class="sliders" id="poseSliders"></div></div><div class="grid cols4" id="cats" style="margin-top:10px"></div><div class="grid cols3" style="margin-top:8px"><button class="btn" data-preset="smile">Smile</button><button class="btn" data-preset="blink">Blink</button><button class="btn" data-preset="jaw">Jaw</button></div><div class="section"><h3>Morph sliders</h3><div class="sliders" id="morphSliders"></div><div class="status" id="status"></div></div><div class="note">הגרסה הזאת לא תלויה ב־Ready Player Me או GLB חיצוני, אז היא אמורה להציג ראש תמיד. זה fallback טכני; אחר כך נחליף אותו במודל איכותי אמיתי.</div></section></div><script type="module" src="fallback.js?v=2"></script></body></html>
