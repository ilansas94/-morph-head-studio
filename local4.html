<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Local Loomis V4</title><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#070a0f;color:#f4f7ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}canvas{position:fixed;inset:0;width:100%;height:100%;background:radial-gradient(circle at 50% 0,#202733,#070a0f 55%,#020305)}header{position:fixed;top:0;left:0;right:0;padding:calc(12px + env(safe-area-inset-top)) 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;background:linear-gradient(180deg,rgba(5,7,10,.9),rgba(5,7,10,0))}.title{font-size:21px;font-weight:900}.sub{font-size:12px;color:#aab4c5;margin-top:3px;direction:ltr}.badge{direction:ltr;background:linear-gradient(90deg,#48e58e,#48c9ff);color:#06120c;font-weight:900;border-radius:999px;padding:9px 12px;font-size:12px}.panel{position:fixed;left:0;right:0;bottom:0;max-height:54vh;overflow:auto;padding:10px 12px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(8,10,16,0),rgba(8,10,16,.88) 8%,rgba(8,10,16,.99));border-top:1px solid rgba(255,255,255,.08);backdrop-filter:blur(16px)}.handle{width:58px;height:6px;border-radius:99px;background:rgba(255,255,255,.34);margin:0 auto 10px}.grid{display:grid;gap:8px}.c3{grid-template-columns:repeat(3,1fr)}.c4{grid-template-columns:repeat(4,1fr)}button{font:inherit}.btn,.tab{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.08);color:#fff;border-radius:16px;padding:11px 7px;font-weight:850;font-size:12px;text-align:center}.on{background:linear-gradient(90deg,#48e58e,#48c9ff)!important;color:#06120c!important;border-color:transparent!important}.warn{border-color:rgba(255,214,111,.35);background:rgba(255,214,111,.12);color:#ffe7a7}.sec{margin-top:10px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.045);border-radius:16px;padding:10px;text-align:right}.sec h3{margin:0 0 7px;font-size:13px;color:#dfffe9}.sliders{display:flex;flex-direction:column;gap:8px;direction:ltr}.sl{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:8px 10px}.top{display:flex;justify-content:space-between;font-size:12px;font-weight:800}.val{color:#48e58e}input{width:100%;accent-color:#48e58e}.note{font-size:11.5px;color:#c9d3e6;line-height:1.35;text-align:right;margin-top:8px}@media(max-height:720px){.panel{max-height:49vh}.note{display:none}.title{font-size:18px}.btn,.tab{padding:9px 5px}}</style></head><body><canvas id="cv"></canvas><header><div class="badge">LOCAL V4</div><div><div class="title">Morph + Loomis Head</div><div class="sub">self contained · no WebGL · no CDN</div></div></header><section class="panel"><div class="handle"></div><div class="grid c3"><button class="btn" data-cam="profile">Profile</button><button class="btn" data-cam="q">¾</button><button class="btn" data-cam="front">Front</button></div><div class="grid c3" style="margin-top:8px"><button class="btn warn" id="reset">Reset</button><button class="btn" data-cam="down">Look Down</button><button class="btn" data-cam="up">Look Up</button></div><div class="grid c3" style="margin-top:8px"><button class="btn on" id="guides">Loomis Guides</button><button class="btn on" id="edges">Edges</button><button class="btn on" id="labels">Labels</button></div><div class="sec"><h3>הטיית הראש</h3><div class="sliders" id="pose"></div></div><div class="grid c4" id="cats" style="margin-top:10px"></div><div class="grid c3" style="margin-top:8px"><button class="btn" data-pre="jaw">Jaw</button><button class="btn" data-pre="blink">Blink</button><button class="btn" data-pre="smile">Smile</button></div><div class="sec"><h3>Morph sliders</h3><div class="sliders" id="morph"></div></div><div class="note">גרסה זו מצוירת מקומית ב־Canvas, לכן היא לא יכולה להיתקע בגלל מודל או CDN. היא לא המודל הסופי, אבל היא מוכיחה את הממשק והקווים.</div></section><script>(()=>{const c=document.getElementById('cv'),x=c.getContext('2d');let W,H,DPR=1,cat='All',showG=1,showE=1,showL=1;let p={yaw:0,pitch:0,roll:0},m={brow:0,eye:.4,nose:.35,mouth:0,jaw:0,chin:0,ear:.35};const cats={All:['brow','eye','nose','mouth','jaw','chin','ear'],Brows:['brow'],Eyes:['eye'],Nose:['nose'],Mouth:['mouth','jaw'],Cheek:['chin','ear']},names={brow:'Eyebrows',eye:'Eye open',nose:'Nose length',mouth:'Mouth / smile',jaw:'Jaw open',chin:'Chin forward',ear:'Ear size'};function size(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*DPR;c.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);draw()}addEventListener('resize',size);function P(a){let[X,Y,Z]=a,cy=Math.cos(p.yaw),sy=Math.sin(p.yaw),cx=Math.cos(p.pitch),sx=Math.sin(p.pitch),cz=Math.cos(p.roll),sz=Math.sin(p.roll);let x1=X*cy-Z*sy,z1=X*sy+Z*cy,y1=Y;let y2=y1*cx-z1*sx,z2=y1*sx+z1*cx;let x3=x1*cz-y2*sz,y3=x1*sz+y2*cz;let s=Math.min(W,H)*.86/(3.0+z2);return[W/2+x3*s,H*.37-y3*s,s]}function poly(pts,col){x.beginPath();pts.map(P).forEach((q,i)=>i?x.lineTo(q[0],q[1]):x.moveTo(q[0],q[1]));x.closePath();x.fillStyle=col;x.fill();if(showE){x.strokeStyle='rgba(0,0,0,.55)';x.lineWidth=1.4;x.stroke()}}function line(pts,col,w=3,dash=0){x.beginPath();if(dash)x.setLineDash([7,6]);pts.map(P).forEach((q,i)=>i?x.lineTo(q[0],q[1]):x.moveTo(q[0],q[1]));x.strokeStyle=col;x.lineWidth=w;x.stroke();x.setLineDash([])}function ell(cx,cy,rx,ry,z,col){let pts=[];for(let i=0;i<=80;i++){let t=i/80*Math.PI*2;pts.push([cx+Math.cos(t)*rx,cy+Math.sin(t)*ry,z])}line(pts,col,2)}function label(t,a,col){if(!showL)return;let q=P(a);x.font='bold 13px -apple-system,Arial';x.lineWidth=4;x.strokeStyle='#000';x.strokeText(t,q[0],q[1]);x.fillStyle=col;x.fillText(t,q[0],q[1])}function draw(){x.clearRect(0,0,W,H);let jw=m.jaw*.18,ch=m.chin*.12,ey=.07+m.eye*.08,nz=.55+m.nose*.16,mo=m.mouth*.12+jw*.5;poly([[-.46,1.05,.05],[-.30,1.55,0],[0,1.68,-.03],[.30,1.55,0],[.46,1.05,.05],[.38,.60,.15],[.18,.35,.34],[0,.28,.42+ch],[-.18,.35,.34],[-.38,.60,.15]],'#bfc7cf');poly([[-.33,1.05,.43],[-.08,1.07,.52],[-.10,1.0,.51],[-.32,.96,.41]],'#d6dde4');poly([[.33,1.05,.43],[.08,1.07,.52],[.10,1.0,.51],[.32,.96,.41]],'#d6dde4');poly([[-.08,1.16,.55],[0,.97,nz],[.08,1.16,.55],[0,1.28,.42]],'#ccd3da');poly([[-.22,.74,.51],[.22,.74,.51],[.20,.70+mo,.55],[-.20,.70+mo,.55]],'#453b34');poly([[-.35,.8,.2],[-.18,.44,.34],[0,.28+jw,.42+ch],[.18,.44,.34],[.35,.8,.2],[.25,.55,.22],[-.25,.55,.22]],'#9fa8b3');poly([[-.18,.18,0],[.18,.18,0],[.24,-.35,-.02],[-.24,-.35,-.02]],'#56606c');poly([[-.75,-.35,-.03],[.75,-.35,-.03],[.95,-.55,-.14],[-.95,-.55,-.14]],'#56606c');poly([[-.58,1.13,.0],[-.47,1.25,.0],[-.47,.92,.0],[-.58,.84,.0]],'#b3bcc6');poly([[.58,1.13,.0],[.47,1.25,.0],[.47,.92,.0],[.58,.84,.0]],'#b3bcc6');ell(0,1.13,.48,.55,.02,'#57c9ff');ell(.39,1.08,.17,.42,.03,'#57c9ff');if(showG){line([[0,1.58,.58],[0,.28,.58]],'#ff78a0',3);[['hair',1.36,'#5af096'],['brow',1.20,'#5af096'],['eye',1.08,'#ffd66f'],['nose',.88,'#5af096'],['mouth',.70,'#ffd66f'],['chin',.46,'#5af096']].forEach(r=>{line([[-.42,r[1],.60],[.42,r[1],.60]],r[2],3);label(r[0],[-.58,r[1],.61],r[2])});label('side plane',[.46,.55,.06],'#57c9ff')}label('ear range',[.55,1.0,.04],'#ffd66f')}function sl(label,min,max,step,val,cb){let d=document.createElement('div');d.className='sl';d.innerHTML='<div class="top"><span>'+label+'</span><span class="val">'+val+'</span></div><input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'">';let i=d.querySelector('input'),v=d.querySelector('.val');i.oninput=()=>{v.textContent=i.value;cb(+i.value);draw()};return d}function ui(){pose.innerHTML='';[['Yaw','yaw',-1.1,1.1],['Pitch','pitch',-.7,.7],['Roll','roll',-.6,.6]].forEach(a=>pose.appendChild(sl(a[0],a[2],a[3],.01,p[a[1]],v=>p[a[1]]=v)));catsEl.innerHTML='';Object.keys(cats).forEach(k=>{let b=document.createElement('button');b.className='tab '+(k==cat?'on':'');b.textContent=k;b.onclick=()=>{cat=k;ui()};catsEl.appendChild(b)});morph.innerHTML='';cats[cat].forEach(k=>morph.appendChild(sl(names[k],0,1,.01,m[k],v=>m[k]=v)))}document.querySelectorAll('[data-cam]').forEach(b=>b.onclick=()=>{let t=b.dataset.cam;p={yaw:t=='profile'?-1.15:t=='q'?-0.55:0,pitch:t=='up'?.45:t=='down'?-.45:0,roll:0};ui();draw()});document.querySelectorAll('[data-pre]').forEach(b=>b.onclick=()=>{Object.assign(m,{brow:0,eye:.4,nose:.35,mouth:0,jaw:0,chin:0,ear:.35});if(b.dataset.pre=='smile')m.mouth=1;if(b.dataset.pre=='jaw')m.jaw=1;if(b.dataset.pre=='blink')m.eye=0;ui();draw()});reset.onclick=()=>{p={yaw:0,pitch:0,roll:0};Object.assign(m,{brow:0,eye:.4,nose:.35,mouth:0,jaw:0,chin:0,ear:.35});ui();draw()};guides.onclick=()=>{showG=!showG;guides.classList.toggle('on',showG);draw()};edges.onclick=()=>{showE=!showE;edges.classList.toggle('on',showE);draw()};labels.onclick=()=>{showL=!showL;labels.classList.toggle('on',showL);draw()};ui();size()})()</script></body></html>
