name: Apply V8 Index

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-v8-index.yml'

permissions:
  contents: write

jobs:
  apply-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write index html
        run: |
          cat > /tmp/index.b64 <<'B64'

B64
          base64 -d /tmp/index.b64 > index.html
      - name: Commit index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No index changes"
          else
            git commit -m "Switch index to visible MPFB viewer v8"
            git push
          fi
